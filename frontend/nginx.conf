# ──────────────────────────────────────────────────────────────
# EvPanel frontend container — self-contained Nginx:
#   serves the Angular SPA AND reverse-proxies /api → backend.
# This replaces the previously separate kzpanel-nginx container.
# ──────────────────────────────────────────────────────────────
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types
    application/javascript application/json application/xml
    text/css text/plain text/xml image/svg+xml;

  upstream kzpanel_backend {
    server kzpanel-backend:3000;
  }

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (baseline; tune CSP per deployment)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # enable with TLS

    client_max_body_size 10m;

    # Scrape run endpoints — long timeout (scraping can take minutes)
    location ~* ^/api/scrape-targets/[^/]+/run$ {
      proxy_pass http://kzpanel_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 600s;
    }

    location /api/scrape-targets/run {
      proxy_pass http://kzpanel_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 600s;
    }

    # API → backend (reverse proxy)
    location /api/ {
      proxy_pass http://kzpanel_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # WebSocket → backend (Socket.IO path)
    location /ws {
      proxy_pass http://kzpanel_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600s;
    }

    # Long-cache hashed static assets
    location ~* \.(?:js|css|woff2|png|jpg|svg|ico)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # SPA history fallback
    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  # ── HTTPS (ready — uncomment after provisioning certs) ───────
  # server {
  #   listen 443 ssl http2;
  #   server_name kzpanel.example.com;
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   # ... same root + location blocks as above ...
  # }
}
