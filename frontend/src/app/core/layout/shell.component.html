<div class="shell">
  <aside class="shell__sidebar">
    <div class="shell__brand">
      <span class="shell__logo">Ev</span>Panel
    </div>

    <nav class="shell__nav">
      @for (item of nav; track item.path) {
        <a
          class="shell__nav-item"
          [routerLink]="item.path"
          routerLinkActive="is-active"
        >
          <span class="material-symbols-rounded">{{ item.icon }}</span>
          <span>{{ item.labelKey | translate }}</span>
        </a>
      }
    </nav>
  </aside>

  <div class="shell__main">
    <header class="shell__topbar">
      <div class="shell__spacer"></div>

      <button class="shell__icon-btn" (click)="language.toggle()" [title]="'common.language' | translate">
        {{ language.lang() | uppercase }}
      </button>

      <button class="shell__icon-btn" (click)="theme.toggle()" [title]="'common.theme' | translate">
        <span class="material-symbols-rounded">{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</span>
      </button>

      <button class="shell__icon-btn" (click)="logout()" [title]="'common.logout' | translate">
        <span class="material-symbols-rounded">logout</span>
      </button>
    </header>

    <main class="shell__content">
      <router-outlet />
    </main>
  </div>
</div>
