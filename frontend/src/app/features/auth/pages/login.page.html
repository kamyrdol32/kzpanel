<div class="login">
  <form class="login__card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="login__brand"><span>Ev</span>Panel</div>
    <h1 class="login__title">{{ 'auth.signIn' | translate }}</h1>

    <label class="login__label">
      {{ 'auth.username' | translate }}
      <input type="text" formControlName="username" autocomplete="username" />
    </label>

    <label class="login__label">
      {{ 'auth.password' | translate }}
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>

    @if (error()) {
      <p class="login__error">{{ error()! | translate }}</p>
    }

    <button type="submit" class="login__submit" [disabled]="loading() || form.invalid">
      {{ (loading() ? 'common.loading' : 'auth.signIn') | translate }}
    </button>
  </form>
</div>
