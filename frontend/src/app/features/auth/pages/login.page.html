<div class="login">
  <form class="login-card" [formGroup]="form" (ngSubmit)="submit()">
    <div class="login-brand">KŻ<span>.</span></div>
    <h1 class="login-title">{{ 'auth.signIn' | translate }}</h1>

    <label class="login-label">
      {{ 'auth.username' | translate }}
      <input type="text" formControlName="username" autocomplete="username" />
    </label>

    <label class="login-label">
      {{ 'auth.password' | translate }}
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>

    <label class="login-remember">
      <input type="checkbox" formControlName="rememberMe" />
      <span class="login-remember-box"></span>
      {{ 'auth.rememberMe' | translate }}
    </label>

    @if (error()) {
      <p class="login-error">{{ error()! | translate }}</p>
    }

    <button type="submit" class="login-submit" [disabled]="loading() || form.invalid">
      {{ (loading() ? 'common.loading' : 'auth.signIn') | translate }}
    </button>

    <div class="login-links">
      <a routerLink="/auth/register">{{ 'auth.createAccount' | translate }}</a>
      <a routerLink="/auth/forgot-password">{{ 'auth.forgotPassword' | translate }}</a>
    </div>
  </form>

  <kz-toast />
</div>
