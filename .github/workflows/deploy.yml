name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord — build started
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          COMMIT_TITLE="${COMMIT_MSG%%$'\n'*}"
          PAYLOAD=$(jq -n \
            --arg title "🚀 Build started — $REPO" \
            --arg branch "$BRANCH" \
            --arg author "$AUTHOR" \
            --arg sha "$SHA" \
            --arg commit_url "$COMMIT_URL" \
            --arg commit_title "$COMMIT_TITLE" \
            --arg run_url "$RUN_URL" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds: [{
              title: $title,
              color: 3447003,
              timestamp: $ts,
              fields: [
                {name: "Branch", value: "`\($branch)`", inline: true},
                {name: "Author", value: $author, inline: true},
                {name: "Commit", value: "[`\($sha[0:7])`](\($commit_url)) \($commit_title)", inline: false},
                {name: "Run", value: "[Zobacz przebieg](\($run_url))", inline: false}
              ]
            }]}')
          MESSAGE_ID=$(curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "${{ secrets.DISCORD_WEBHOOK_URL }}?wait=true" | jq -r '.id')
          echo "DISCORD_MESSAGE_ID=$MESSAGE_ID" >> "$GITHUB_ENV"
        shell: bash

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Build and deploy on VPS
        run: |
          set +e
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_PROJECT_PATH }} && git fetch origin main && git reset --hard origin/main && docker compose up -d --build" \
            2>&1 | tee deploy.log
          exit_code=${PIPESTATUS[0]}
          exit $exit_code
        shell: bash

      - name: Notify Discord — build succeeded
        if: success()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          COMMIT_TITLE="${COMMIT_MSG%%$'\n'*}"
          PAYLOAD=$(jq -n \
            --arg title "✅ Build succeeded — $REPO" \
            --arg branch "$BRANCH" \
            --arg author "$AUTHOR" \
            --arg sha "$SHA" \
            --arg commit_url "$COMMIT_URL" \
            --arg commit_title "$COMMIT_TITLE" \
            --arg run_url "$RUN_URL" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds: [{
              title: $title,
              color: 3066993,
              timestamp: $ts,
              fields: [
                {name: "Branch", value: "`\($branch)`", inline: true},
                {name: "Author", value: $author, inline: true},
                {name: "Commit", value: "[`\($sha[0:7])`](\($commit_url)) \($commit_title)", inline: false},
                {name: "Run", value: "[Zobacz przebieg](\($run_url))", inline: false}
              ]
            }]}')
          curl -X DELETE "${{ secrets.DISCORD_WEBHOOK_URL }}/messages/$DISCORD_MESSAGE_ID"
          FINAL_MESSAGE_ID=$(curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "${{ secrets.DISCORD_WEBHOOK_URL }}?wait=true" | jq -r '.id')
          echo "DISCORD_FINAL_MESSAGE_ID=$FINAL_MESSAGE_ID" >> "$GITHUB_ENV"
        shell: bash

      - name: Notify Discord — build failed
        if: failure()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          COMMIT_TITLE="${COMMIT_MSG%%$'\n'*}"
          ERROR_LOG=$(tail -n 30 deploy.log)
          PAYLOAD=$(jq -n \
            --arg title "❌ Build failed — $REPO" \
            --arg branch "$BRANCH" \
            --arg author "$AUTHOR" \
            --arg sha "$SHA" \
            --arg commit_url "$COMMIT_URL" \
            --arg commit_title "$COMMIT_TITLE" \
            --arg run_url "$RUN_URL" \
            --arg error_log "$ERROR_LOG" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds: [{
              title: $title,
              color: 15158332,
              timestamp: $ts,
              fields: [
                {name: "Branch", value: "`\($branch)`", inline: true},
                {name: "Author", value: $author, inline: true},
                {name: "Commit", value: "[`\($sha[0:7])`](\($commit_url)) \($commit_title)", inline: false},
                {name: "Run", value: "[Zobacz przebieg](\($run_url))", inline: false},
                {name: "Log", value: "```\($error_log)```", inline: false}
              ]
            }]}')
          curl -X DELETE "${{ secrets.DISCORD_WEBHOOK_URL }}/messages/$DISCORD_MESSAGE_ID"
          FINAL_MESSAGE_ID=$(curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "${{ secrets.DISCORD_WEBHOOK_URL }}?wait=true" | jq -r '.id')
          echo "DISCORD_FINAL_MESSAGE_ID=$FINAL_MESSAGE_ID" >> "$GITHUB_ENV"
        shell: bash

      - name: Remove Discord notification after 5 minutes
        if: always()
        run: |
          sleep 300
          curl -X DELETE "${{ secrets.DISCORD_WEBHOOK_URL }}/messages/$DISCORD_FINAL_MESSAGE_ID"
        shell: bash
