name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Build and deploy on VPS
        run: |
          set +e
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_PROJECT_PATH }} && git pull && docker compose up -d --build" \
            2>&1 | tee deploy.log
          exit_code=${PIPESTATUS[0]}
          exit $exit_code
        shell: bash

      - name: Notify Discord on failure
        if: failure()
        run: |
          ERROR_LOG=$(tail -n 30 deploy.log)
          DESC="**Commit:** \`${{ github.sha }}\`
          **Author:** ${{ github.actor }}
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          \`\`\`
          $ERROR_LOG
          \`\`\`"
          PAYLOAD=$(jq -n \
            --arg title "❌ Deploy failed: ${{ github.repository }}" \
            --arg desc "$DESC" \
            '{embeds: [{title: $title, description: $desc, color: 15158332}]}')
          curl -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "${{ secrets.DISCORD_WEBHOOK_URL }}"
        shell: bash
