name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    name: ${{ matrix.package }} (lint · test · build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [backend, scraper, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      # shared is a local dependency for every package
      - name: Build shared
        run: |
          cd shared
          npm install
          npm run build

      - name: Install
        run: cd ${{ matrix.package }} && npm install

      - name: Lint
        run: cd ${{ matrix.package }} && npm run lint --if-present

      - name: Test
        run: cd ${{ matrix.package }} && npm test --if-present

      - name: Build
        run: cd ${{ matrix.package }} && npm run build
