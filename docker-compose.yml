# ──────────────────────────────────────────────────────────────
# KŻ-Panel 2.0 — PRODUCTION compose
# Usage:
#   cp backend/.env.example backend/.env && edit
#   cp scraper/.env.example scraper/.env && edit
#   docker compose up -d --build
#
# Each service reads its own .env from its subdirectory.
# The database is EXTERNAL (shared PostgreSQL) — this stack does not
# run it. Set POSTGRES_HOST in backend/.env (use host.docker.internal
# for a DB running on the Docker host).
# ──────────────────────────────────────────────────────────────
services:
  kzpanel-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kzpanel-frontend
    restart: unless-stopped
    depends_on:
      - kzpanel-backend
    ports:
      - '80:3001'
    healthcheck:
      test: [ 'CMD', 'curl', '-fsS', 'http://localhost:3001/' ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - kzpanel_default
      - nginx-proxy-manager_default

  kzpanel-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kzpanel-backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      - kzpanel-scraper
    ports:
      - '5001:5001'
    healthcheck:
      test: [ 'CMD', 'node', '-e', "require('http').get('http://localhost:'+ (process.env.BACKEND_PORT||3000) +'/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - kzpanel_default
      - nginx-proxy-manager_default
      - postgres_default

  kzpanel-scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: kzpanel-scraper
    restart: unless-stopped
    env_file: ./scraper/.env
    ports:
      - '4001:4001'
    networks:
      - kzpanel_default
      - nginx-proxy-manager_default

networks:
  kzpanel_default:
    driver: bridge
  nginx-proxy-manager_default:
    external: true
  postgres_default:
    external: true
