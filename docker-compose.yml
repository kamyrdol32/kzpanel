# ──────────────────────────────────────────────────────────────
# EvPanel 2.0 — PRODUCTION compose (full stack in Docker)
# Usage: cp .env.docker.example .env.docker && edit, then:
#        docker compose --env-file .env.docker up -d --build
# The backend container runs DB migrations on startup (DB_SYNC=false).
# ──────────────────────────────────────────────────────────────
services:
  db:
    image: postgres:16-alpine
    container_name: evpanel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - evpanel-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [evpanel-net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: evpanel-backend
    restart: unless-stopped
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:'+ (process.env.BACKEND_PORT||3000) +'/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [evpanel-net]

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: evpanel-scraper
    restart: unless-stopped
    env_file: .env.docker
    # Stateless worker: no DB, no dependency on other services. The backend
    # calls it on demand / on schedule.
    networks: [evpanel-net]

  # Frontend container = Angular SPA + edge Nginx (reverse proxy to backend).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: evpanel-frontend
    restart: unless-stopped
    depends_on: [backend]
    ports:
      - '80:80'
      # - '443:443'   # odkomentuj po skonfigurowaniu TLS
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost/']
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [evpanel-net]

volumes:
  evpanel-db-data:

networks:
  evpanel-net:
    driver: bridge
