# ──────────────────────────────────────────────────────────────
# EvPanel 2.0 — PRODUCTION compose
# Usage:
#   cp backend/.env.example backend/.env && edit
#   cp scraper/.env.example scraper/.env && edit
#   docker compose up -d --build
#
# Each service reads its own .env from its subdirectory.
# The database is EXTERNAL (shared PostgreSQL) — this stack does not
# run it. Set POSTGRES_HOST in backend/.env (use host.docker.internal
# for a DB running on the Docker host).
# ──────────────────────────────────────────────────────────────
services:
  evpanel-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: evpanel-frontend
    restart: unless-stopped
    depends_on:
      - evpanel-backend
    ports:
      - '80:80'
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost/']
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - evpanel_default

  evpanel-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: evpanel-backend
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      - evpanel-scraper
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:'+ (process.env.BACKEND_PORT||3000) +'/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - evpanel_default
      - postgres_default

  evpanel-scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: evpanel-scraper
    restart: unless-stopped
    env_file: ./scraper/.env
    networks:
      - evpanel_default

networks:
  evpanel_default:
    driver: bridge
  postgres_default:
    external: true
